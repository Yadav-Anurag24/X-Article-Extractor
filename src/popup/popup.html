<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 250px; 
      padding: 15px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      text-align: center; 
      background-color: #15202b; /* X Dark mode theme */
      color: white;
    }
    button { 
      padding: 12px 15px; 
      background: #1DA1F2; 
      color: white; 
      border: none; 
      border-radius: 9999px; /* Pill shape like X buttons */
      cursor: pointer; 
      width: 100%; 
      font-weight: bold; 
      font-size: 15px;
      transition: background 0.2s;
    }
    button:hover { 
      background: #1a91da; 
    }
  </style>
</head>
<body>
  <h3>X Extractor</h3>
  <button id="extractBtn">Extract Article</button>
  <script src="popup.js"></script>
</body>
</html>
